name: CI - Testes e Qualidade de Codigo

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Testes Automatizados (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache de dependencias pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar qualidade do codigo (Flake8)
        run: |
          flake8 src/ tests/ \
            --max-line-length=100 \
            --exclude=__pycache__,*.pyc \
            --ignore=E402,F401 \
            --count \
            --statistics

      - name: Executar testes com Pytest
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            -v

      - name: Resumo do pipeline
        if: always()
        run: |
          echo "=============================================="
          echo "  Pipeline SGT - TechFlow Solutions"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "=============================================="