# ──────────────────────────────────────────────────────────────────────────────
# Pipeline de Integração Contínua — SGT (TechFlow Solutions)
# Acionado a cada push ou pull_request nas branches main e develop.
#
# Etapas executadas em sequência:
#   1. Checkout do código
#   2. Configuração do Python 3.11
#   3. Instalação das dependências
#   4. Verificação de qualidade de código com Flake8
#   5. Execução dos testes com Pytest + relatório de cobertura
#      (falha automaticamente se cobertura < 80%)
# ──────────────────────────────────────────────────────────────────────────────

name: CI — Testes e Qualidade de Código

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Testes Automatizados (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do repositório no runner
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Configura o Python na versão definida
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cache das dependências para acelerar execuções futuras
      - name: Cache de dependências pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Instala todas as dependências listadas no requirements.txt
      - name: Instalar dependências
        run: pip install -r requirements.txt

      # 5. Verifica qualidade e estilo do código com Flake8
      #    Configuração: linha máxima de 100 caracteres, erros críticos apenas
      - name: Verificar qualidade do código (Flake8)
        run: |
          flake8 src/ tests/ \
            --max-line-length=100 \
            --exclude=__pycache__,*.pyc \
            --count \
            --statistics

      # 6. Executa os testes com Pytest e gera relatório de cobertura
      #    --cov=src           → mede cobertura do pacote src/
      #    --cov-fail-under=80 → falha o pipeline se cobertura < 80%
      #    -v                  → saída detalhada por teste
      - name: Executar testes com Pytest
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      # 7. Exibe resumo final do pipeline
      - name: Resumo do pipeline
        if: always()
        run: |
          echo "=============================================="
          echo "  Pipeline SGT — TechFlow Solutions"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "=============================================="
